name: Planner
description: "Planner des modes de journée et des phases horaires"
version: "1.0.3"
slug: planner
init: false
arch:
  - amd64
  - armv7
  - aarch64
  - i386
startup: services
boot: auto
url: "https://github.com/jesuisla91/ha-addons"

# --- INTÉGRATION DANS HOME ASSISTANT ---
ingress: true
ingress_port: 8099
ingress_stream: false
panel_icon: mdi:calendar-clock
panel_title: Planner
panel_admin: false

# --- PORT EXPOSÉ (LAN uniquement) ---
# Le port 8099 est disponible sur le LAN de ton Synology.
# Node-RED y accède via homeassistant.local:8099.
# Plus d'exposition Internet (pas de DuckDNS).
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "API planner (LAN)"

map:
  - config:rw

options: {}
schema: {}
