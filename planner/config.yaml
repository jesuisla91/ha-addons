name: Planner
description: "Planner des modes de journée et des phases horaires"
version: "1.0.2"
slug: planner
init: false
arch:
  - amd64
  - armv7
  - aarch64
  - i386
startup: services
boot: auto
url: "https://github.com/jesuisla91/ha-addons"

# --- INTÉGRATION DANS HOME ASSISTANT ---
ingress: true
ingress_port: 8099
ingress_stream: false
panel_icon: mdi:calendar-clock
panel_title: Planner
panel_admin: false

# --- PORT INTERNE (réseau Docker du Supervisor uniquement) ---
# null = port non exposé sur l'hôte HAOS (pas de LAN, pas d'Internet)
# Mais accessible aux autres add-ons via homeassistant.local:8099
ports:
  8099/tcp: null
ports_description:
  8099/tcp: "API interne (Node-RED)"

map:
  - config:rw

options: {}
schema: {}
